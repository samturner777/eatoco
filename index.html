<title>EATO — Discover the Best of Africa</title>

<style>
:root{
  --black:#0A0A0A;
  --white:#FFFFFF;
  --offwhite:#FAFAF8;
  --gold:#C9A227;
  --gold-soft:#D9B84A;
  --grey:#7A7A76;
  --ink:#1A1A18;
  --line:#E5E3DE;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%;overflow-x:hidden;}
body{background:var(--white);color:var(--ink);font-family:'Inter',sans-serif;font-weight:400;overflow-x:hidden;width:100%;-webkit-font-smoothing:antialiased;}
img{display:block;max-width:100%;}
a{color:inherit;text-decoration:none;}
button{font-family:inherit;cursor:pointer;}
.serif{font-family:'Fraunces',serif;}

@media (prefers-reduced-motion: reduce){*{animation-duration:0.01ms !important;animation-iteration-count:1 !important;transition-duration:0.01ms !important;scroll-behavior:auto !important;}}
a:focus-visible,button:focus-visible,input:focus-visible{outline:2px solid var(--gold);outline-offset:3px;}

.wrap{max-width:1180px;width:100%;margin:0 auto;padding:0 24px;box-sizing:border-box;}
@media (min-width:768px){.wrap{padding:0 48px;}}

/* ───────── NAV ───────── */
nav{position:sticky;top:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:18px 24px;background:rgba(255,255,255,0.92);backdrop-filter:blur(14px);border-bottom:1px solid rgba(0,0,0,0.04);}
@media (min-width:768px){nav{padding:20px 48px;}}
.nav-logo{display:flex;align-items:center;}
.nav-logo-img{height:34px;width:auto;display:block;}
.nav-cta{font-size:12.5px;font-weight:600;letter-spacing:0.02em;background:var(--ink);color:var(--white);padding:10px 18px;border:none;border-radius:2px;transition:background 0.2s;}
.nav-cta:hover{background:var(--gold);color:var(--ink);}
.nav-right{display:flex;align-items:center;gap:18px;}
.nav-social{display:flex;align-items:center;gap:12px;}
.nav-social a{color:var(--ink);opacity:0.65;transition:opacity 0.2s, color 0.2s;display:flex;}
.nav-social a:hover{opacity:1;color:var(--gold);}
.nav-social svg{width:17px;height:17px;display:block;}
@media (max-width:640px){.nav-social{gap:10px;}.nav-social svg{width:15px;height:15px;}}

/* ═════════ HERO — photo + immediate email capture ═════════ */
.hero{position:relative;min-height:100vh;display:flex;flex-direction:column;justify-content:flex-end;overflow:hidden;}
.hero-img{position:absolute;inset:0;z-index:0;}
.hero-img img{width:100%;height:100%;object-fit:cover;object-position:center 30%;}
.hero-img::after{content:'';position:absolute;inset:0;background:linear-gradient(to top, rgba(0,0,0,0.92) 0%, rgba(0,0,0,0.58) 34%, rgba(0,0,0,0.2) 60%, rgba(0,0,0,0.28) 100%);}
.hero-content{position:relative;z-index:2;padding:150px 0 56px;}
.hero-eyebrow{display:flex;align-items:center;gap:10px;font-size:10.5px;letter-spacing:0.1em;text-transform:uppercase;color:var(--gold-soft);font-weight:700;margin-bottom:24px;max-width:100%;}
@media (min-width:480px){.hero-eyebrow{font-size:11px;letter-spacing:0.18em;}}
.hero-eyebrow::before{content:'';width:18px;height:1px;background:var(--gold);flex-shrink:0;}
.hero-h1{font-family:'Fraunces',serif;font-weight:400;font-size:clamp(40px,10.5vw,86px);line-height:0.98;letter-spacing:-0.01em;color:var(--white);margin-bottom:140px;}
.hero-h1 em{font-style:italic;font-weight:300;color:var(--gold-soft);}
.hero-sub{font-size:clamp(14px,2.4vw,17px);font-weight:500;letter-spacing:0.02em;color:#fff;margin-bottom:28px;max-width:480px;line-height:1.6;opacity:0.92;}

/* Inline hero email capture — the real CTA */
.hero-form-card{background:rgba(255,255,255,0.97);backdrop-filter:blur(10px);padding:22px;border-radius:3px;max-width:460px;margin-bottom:18px;}
.hero-form-label{font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--grey);font-weight:700;margin-bottom:12px;display:block;}
.hero-form-row{display:flex;flex-direction:column;gap:10px;}
@media (min-width:480px){.hero-form-row{flex-direction:row;}}
.hero-input{flex:1;background:var(--white);border:1px solid var(--line);color:var(--ink);font-family:'Inter',sans-serif;font-size:14.5px;padding:13px 16px;border-radius:2px;outline:none;}
.hero-input::placeholder{color:#aaa;}
.hero-input:focus{border-color:var(--gold);}
.hero-btn{background:var(--gold);color:var(--ink);font-size:13px;font-weight:700;letter-spacing:0.02em;padding:13px 24px;border:none;border-radius:2px;white-space:nowrap;}
.hero-btn:hover{background:var(--gold-soft);}
.hero-form-note{font-size:10.5px;color:#888;margin-top:10px;}

.hero-secondary-row{display:flex;align-items:center;gap:20px;}
.hero-secondary-link{font-size:12.5px;font-weight:600;letter-spacing:0.02em;color:#fff;border-bottom:1px solid rgba(255,255,255,0.4);padding-bottom:3px;}
.hero-secondary-link:hover{border-color:var(--gold);color:var(--gold-soft);}

.city-ticker{position:relative;z-index:2;margin-top:40px;padding-top:20px;border-top:1px solid rgba(255,255,255,0.15);overflow:hidden;}
.city-track{display:flex;gap:40px;white-space:nowrap;}
.city-track span{font-family:'Fraunces',serif;font-size:13px;font-style:italic;color:#C9C9C4;letter-spacing:0.02em;}

/* rest of CSS omitted for brevity in this commit content — kept unchanged in the repository file */
.center{text-align:center;}
</style>
</head>

</nav>

<!-- Social links fix script: ensures aria-labeled social anchors point to correct URLs -->
<script>
(function () {
  const urls = {
    Instagram: 'https://www.instagram.com/eatonetwork',
    TikTok: 'https://www.tiktok.com/@eatonetwork',
    YouTube: 'https://youtube.com/@eatonetwork',
    X: 'https://x.com/eatonetwork',
    Twitter: 'https://x.com/eatonetwork',
    LinkedIn: 'https://www.linkedin.com/company/eato-network'
  };

  document.querySelectorAll('a[aria-label]').forEach(a => {
    const label = a.getAttribute('aria-label');
    if (label && urls[label]) {
      a.setAttribute('href', urls[label]);
      a.setAttribute('target', '_blank');
      a.setAttribute('rel', 'noopener');
    }
  });
})();
</script>
